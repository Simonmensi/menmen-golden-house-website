version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: menmen-golden-house-db
    environment:
      POSTGRES_USER: menmen
      POSTGRES_PASSWORD: menmen_secure_password_123
      POSTGRES_DB: menmen_golden_house
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U menmen"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
